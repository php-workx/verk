scheduler:
  max_concurrency: 4
policy:
  review_threshold: P2
  max_implementation_attempts: 3
  max_repair_cycles: 2
  allow_dirty_worktree: true
runtime:
  default_runtime: codex
  worker_timeout_minutes: 20
  reviewer_timeout_minutes: 10
  auth_env_vars: []
  worker:
    runtime: codex
    model: gpt-5.3-codex-spark
    reasoning: high
  reviewer:
    runtime: codex
    model: gpt-5.4
    reasoning: high
verification:
  default_timeout_minutes: 15
  env_passthrough:
    - PATH
    - HOME
    - CI
  quality_commands:
    - path: ""
      run:
        - just format
        - just lint
        - just build-check
  wave_commands:
    - path: ""
      run:
        - just vuln
        - just semgrep
  epic_closure_commands:
    - path: ""
      run:
        - just test-fast
        - just test-race
        - just vuln
        - just semgrep
logging:
  level: ""
  artifact_retention: 0
